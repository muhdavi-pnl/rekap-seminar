<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Jadwal yang ditampilkan diambil dari data SITUHIR">
    <meta name="author" content="Muhammad Davi">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#ffffff">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Pogram Studi TI Jurusan TIK - Politeknik Negeri Lhokseumawe">
    <meta property="og:description" content="Jadwal yang ditampilkan diambil dari data SITUHIR">
    <meta property="og:image" content="https://tik-pnl.github.io/jadwal-trkj/img/logo.ico">
    <meta property="og:url" content="https://situhir.tik-pnl.web.id">
    <meta property="og:type" content="website">

    <!-- Links to external resources like stylesheets, icons, and fonts also go here -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Favicon -->
    <link rel="shortcut icon" href="img/logo.ico" type="image/x-icon">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.2/css/buttons.bootstrap4.min.css">
</head>

<body>
<div class="container-fluid p-2">
    <header class="pb-3 mb-3 border-bottom">
        <div id="logo" class="d-none d-md-block d-lg-block">
            <a href="#">
                <img src="img/logo.png" alt="PNL" class="w-25">
            </a>
        </div>
        <div class="fs-4 font-weight-bold prodi">Pogram Studi Teknologi Rekayasa Komputer Jaringan</div>
        <div class="fs-4 font-weight-bold">Jurusan Teknologi Informasi dan Kompuer</div>
    </header>

    <table id="rekap" class="table table-striped table-responsive-sm" style="width:100%">
        <thead class="thead-dark">
        <tr>
            <th class="w-tanggal">Tanggal</th>
            <th>NIM</th>
            <th>Nama</th>
            <th>Judul</th>
            <th>Ketua</th>
            <th>Sekretaris</th>
            <th>Pembahas 1</th>
            <th>Pembahas 2</th>
        </tr>
        </thead>
        <tfoot class="thead-dark">
        <tr>
            <th class="w-tanggal">Tanggal</th>
            <th>NIM</th>
            <th>Nama</th>
            <th>Judul</th>
            <th>Ketua</th>
            <th>Sekretaris</th>
            <th>Pembahas 1</th>
            <th>Pembahas 2</th>
        </tr>
        </tfoot>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.1/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.2/js/buttons.bootstrap4.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.3.2/js/buttons.colVis.min.js"></script>

<script>

function toTitleCase(str) {
    if (!str) return '';
    return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function formatTanggal(tanggal) {
    if (!tanggal) return '';
    
    const date = new Date(tanggal);
    
    return date.toLocaleDateString('id-ID', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
    });
}

function capitalizeRenderer(data) {
    return toTitleCase(data);
}

$(document).ready(function () {

    $('#rekap').DataTable({

        ajax: 'https://situhir.tik-pnl.web.id/api/rekap-seminar',

        processing: true,
        deferRender: true,
        paging: false,
        scrollY: '400px',
        scrollCollapse: true,
        lengthChange: false,

        dom: 'Bfrtip',

        columns: [

            {
                data: 'tanggal',
                render: data => formatTanggal(data)
            },

            { data: 'mahasiswa.nim' },

            {
                data: 'mahasiswa.nama_mahasiswa',
                render: capitalizeRenderer
            },

            { data: 'judul' },

            {
                data: 'ketua.nama_lengkap',
                render: capitalizeRenderer
            },

            {
                data: 'sekretaris.nama_lengkap',
                render: capitalizeRenderer
            },

            {
                data: 'pembahas_1.nama_lengkap',
                render: capitalizeRenderer
            },

            {
                data: 'pembahas_2.nama_lengkap',
                render: capitalizeRenderer
            }

        ],

        buttons: [
            {
                extend: 'colvis',
                collectionLayout: 'fixed columns',
                collectionTitle: 'Pilih kolom header/footer'
            }
        ]

    });

});

</script>
</body>

</html>
